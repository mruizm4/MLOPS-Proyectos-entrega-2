apiVersion: v1
data:
  prometheus.yml: |-
    global:
      scrape_interval: 5s

    scrape_configs:

      - job_name: "inference-api"

        static_configs:
          - targets:
              - "api-inference:8001"

      - job_name: "node-exporter"

        static_configs:
          - targets:
              - "node-exporter:9100"
kind: ConfigMap
metadata:
  annotations:
    use-subpath: "true"
  labels:
    io.kompose.service: prometheus
  name: prometheus-cm0
