apiVersion: apps/v1
kind: Deployment

metadata:
  name: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        app: postgres

    spec:
      restartPolicy: Always

      containers:
        - name: postgres

          image: postgres:13

          env:
            - name: POSTGRES_DB
              value: airflow

            - name: POSTGRES_USER
              value: airflow

            - name: POSTGRES_PASSWORD
              value: airflow

          ports:
            - containerPort: 5432
              protocol: TCP

          volumeMounts:
            - name: postgres-db-volume
              mountPath: /var/lib/postgresql/data

      volumes:
        - name: postgres-db-volume
          persistentVolumeClaim:
            claimName: postgres-db-volume